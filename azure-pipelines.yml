trigger:
- main

pool:
  name: AgentVK

variables:
  workingDir: $(System.DefaultWorkingDirectory)

stages:

# -------------------------
# Stage 1 : Install, Init, Validate, Plan
# -------------------------

- stage: Terraform_Plan
  displayName: Terraform Install Init Validate Plan

  jobs:
  - job: Plan
    displayName: Terraform Plan Job

    steps:

    - checkout: self

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDir)'
        backendServiceArm: 'vk-secret'
        backendAzureRmResourceGroupName: 'rg-terraform-state'
        backendAzureRmStorageAccountName: 'stgformstate231023'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'dev-tfstate'

    - task: TerraformTaskV4@4
      displayName: Terraform Validate
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(workingDir)'

    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'vk-secret'
        workingDirectory: '$(workingDir)'


# -------------------------
# Stage 2 : Install, Init, Apply
# -------------------------

- stage: Terraform_Apply
  displayName: Terraform Apply
  dependsOn: Terraform_Plan

  jobs:
  - job: Apply
    displayName: Terraform Apply Job

    steps:

    - checkout: self

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDir)'
        backendServiceArm: 'vk-secret'
        backendAzureRmResourceGroupName: 'rg-terraform-state'
        backendAzureRmStorageAccountName: 'stgformstate231023'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'dev-tfstate'

    - task: TerraformTaskV4@4
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        commandOptions: '-auto-approve'
        environmentServiceNameAzureRM: 'vk-secret'
        workingDirectory: '$(workingDir)'


# -------------------------
# Stage 3 : Ansible Nginx Installation
# -------------------------

- stage: Ansible_Config
  displayName: Configure Nginx with Ansible
  dependsOn: Terraform_Apply

  jobs:
  - job: Ansible
    displayName: Ansible Configuration

    steps:

    - checkout: self

    - script: |
        ansible-playbook -i ansible/inventory ansible/install_nginx.yaml
      displayName: Run Ansible Playbook