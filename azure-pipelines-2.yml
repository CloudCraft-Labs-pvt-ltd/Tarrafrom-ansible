trigger: none

parameters:
- name: runScanning
  type: boolean
  default: true

- name: runDestroy
  type: boolean
  default: false

variables: 
  WorkingDir: $(System.DefaultWorkingDirectory)
  VkScerte: vk-secret
  TerraformDir: '$(System.DefaultWorkingDirectory)/terraform'
  EnvVarFile: 'dev.tfvars'  # Change per environment

pool: AgentVK

# ---------------- Build Stage ----------------
stages:
- stage: Build_Stage
  displayName: Build Stage
  jobs:

  # Install Terraform & Init Backend
  - job: Terraform_Install_Init
    displayName: Install & Init Terraform
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(TerraformDir)
        backendServiceArm: $(VkScerte)
        backendAzureRmResourceGroupName: 'rg-terraform-state'
        backendAzureRmStorageAccountName: 'stgformstate231023'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'terraform.tfstate'

  # Terraform Plan
  - job: TerraformPlan
    displayName: Terraform Plan
    dependsOn: Terraform_Install_Init
    steps:
    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: $(TerraformDir)
        environmentServiceNameAzureRM: $(VkScerte)
        commandOptions: '-var-file="$(TerraformDir)/$(EnvVarFile)" -input=false'

# ---------------- Scanning Stage ----------------
- stage: Scanning_Stage
  displayName: Security Scanning
  dependsOn: Build_Stage
  condition: and(succeeded(), eq(${{ parameters.runScanning }}, true))
  jobs:
  - job: ScanningJob
    displayName: tfsec Scan
    # steps:
    # # - task: tfsec@1
    # #   inputs:
    # #     version: 'v1.26.0'
    # #     dir: '$(WorkingDir)'

# ---------------- Deploy Stage ----------------
- stage: Deploy_Stage
  displayName: Deploy Stage
  dependsOn:
    - Build_Stage
    - Scanning_Stage
  condition: succeeded()
  jobs:

  # Manual Approval
  - job: ManualValidation
    pool: server
    steps:
    - task: ManualValidation@1
      inputs:
        notifyUsers: 'vaibhavkhupse116@gmail.com'
        approvers: 'vaibhavkhupse116@gmail.com'
        instructions: 'Please review Terraform plan before approval'

  # Terraform Apply
  - job: TerraformApply
    dependsOn: ManualValidation
    displayName: Terraform Apply
    steps:
    - task: TerraformTask@5
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: $(TerraformDir)
        environmentServiceNameAzureRM: $(VkScerte)
        commandOptions: '-var-file="$(TerraformDir)/$(EnvVarFile)" -input=false -auto-approve'

  # Terraform Destroy (optional)
  - job: TerraformDestroy
    dependsOn: TerraformApply
    condition: eq(${{ parameters.runDestroy }}, true)
    displayName: Terraform Destroy
    steps:
    - task: TerraformTask@5
      displayName: Terraform Destroy
      inputs:
        provider: 'azurerm'
        command: 'destroy'
        workingDirectory: $(TerraformDir)
        environmentServiceNameAzureRM: $(VkScerte)
        commandOptions: '-var-file="$(TerraformDir)/$(EnvVarFile)" -input=false -auto-approve'