trigger:
  branches:
    include:
      - main
      - feature/*

variables:
  WorkingDir: '$(System.DefaultWorkingDirectory)/prod'
  VkScerte: vk-secret

pool: AgentVK

stages:

# ================= BUILD STAGE =================

- stage: Build_Stage
  displayName: Build Stage
  jobs:

  - job: Terraform_Init
    displayName: Terraform Init
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(WorkingDir)
        backendServiceArm: $(VkScerte)
        backendAzureRmResourceGroupName: 'rg-terraform-state'
        backendAzureRmStorageAccountName: 'stgformstate231023'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'prod.tfstate'

  - job: Terraform_Plan
    displayName: Terraform Plan
    dependsOn: Terraform_Init
    steps:

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(WorkingDir)
        backendServiceArm: $(VkScerte)
        backendAzureRmResourceGroupName: 'rg-terraform-state'
        backendAzureRmStorageAccountName: 'stgformstate231023'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'prod.tfstate'
        
    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: $(WorkingDir)
        environmentServiceNameAzureRM: $(VkScerte)

# ================= SCANNING STAGE =================

- stage: Scanning_Stage
  displayName: Security Scan Stage
  dependsOn: Build_Stage
  jobs:
  - job: Tfsec_Scan
    displayName: Run tfsec Scan
    steps:
    - task: tfsec@1
      inputs:
        version: 'v1.26.0'
        dir: '$(WorkingDir)'

# ================= DEPLOY STAGE =================

- stage: Deploy_Stage
  displayName: Deploy Stage
  dependsOn:
    - Build_Stage
    - Scanning_Stage
  condition: succeeded()
  jobs:

  - job: Manual_Approval
    displayName: Manual Approval
    pool: server
    steps:
    - task: ManualValidation@1
      inputs:
        notifyUsers: 'vaibhavkhupse116@gmail.com'
        approvers: 'vaibhavkhupse116@gmail.com'
        instructions: 'Please review Terraform plan before approval.'

  - job: Terraform_Apply
    displayName: Terraform Apply
    dependsOn: Manual_Approval
    steps:
    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(WorkingDir)
        backendServiceArm: $(VkScerte)
        backendAzureRmResourceGroupName: 'rg-terraform-state'
        backendAzureRmStorageAccountName: 'stgformstate231023'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'prod.tfstate'

    - task: TerraformTask@5
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: $(WorkingDir)
        environmentServiceNameAzureRM: $(VkScerte)

